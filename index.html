<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LTD Grove Street — Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --v: #A78BFA;
    --vl: #C4B5FD;
    --vd: #7C5CBF;
    --vglow: rgba(167,139,250,0.15);
    --bg: #06050e;
    --bg2: #09081a;
    --bg3: #0e0c1c;
    --bg4: #151228;
    --bg5: #1c1832;
    --border: #1a1730;
    --border2: #251f45;
    --text: #f0ecff;
    --text2: #9b91c8;
    --text3: #4e4770;
    --green: #34d399;
    --greenb: rgba(52,211,153,.1);
    --amber: #fbbf24;
    --amberb: rgba(251,191,36,.1);
    --red: #f87171;
    --redb: rgba(248,113,113,.1);
    --font-d: 'Bebas Neue', sans-serif;
    --font-b: 'DM Sans', sans-serif;
    --font-m: 'Space Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }
 
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-b); font-size: 14px; overflow: hidden; }
 
  /* Subtle noise */
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(167,139,250,0.008) 3px, rgba(167,139,250,0.008) 4px);
    pointer-events: none; z-index: 9999;
  }
 
  /* Ambient glow top */
  body::after {
    content: ''; position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(124,92,191,0.18) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
 
  .shell { display: grid; grid-template-rows: auto auto auto 1fr; height: 100vh; overflow: hidden; position: relative; z-index: 1; }
 
  /* ── HEADER ── */
  .header { background: rgba(6,5,14,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border2); position: relative; }
  .header::after {
    content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--vd) 40%, var(--v) 60%, transparent 100%);
    opacity: 0.5;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px 10px; }
  .header-bottom { padding: 0 28px 14px; }
 
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-mark { position: relative; }
  .logo-mark::after {
    content: ''; position: absolute; inset: -4px; border-radius: 10px;
    background: radial-gradient(circle, rgba(167,139,250,0.15), transparent 70%);
    pointer-events: none;
  }
  .logo-mark svg { width: 42px; height: 42px; display: block; }
  .logo-text h1 { font-family: var(--font-d); font-size: 26px; letter-spacing: 5px; color: var(--text); line-height: 1; }
  .logo-text span { font-family: var(--font-m); font-size: 7px; letter-spacing: 5px; color: var(--vd); display: block; margin-top: 3px; text-transform: uppercase; }
 
  .header-right { display: flex; align-items: center; gap: 16px; }
  .clock-block { text-align: right; }
  .clock-time { font-family: var(--font-m); font-size: 22px; color: var(--text); letter-spacing: 3px; line-height: 1; }
  .clock-date { font-family: var(--font-m); font-size: 8px; color: var(--text3); letter-spacing: 2px; margin-top: 3px; text-transform: uppercase; }
 
  .status-pill {
    display: flex; align-items: center; gap: 7px;
    background: rgba(52,211,153,0.07); border: 1px solid rgba(52,211,153,0.2);
    border-radius: 20px; padding: 6px 14px;
    font-family: var(--font-m); font-size: 8px; letter-spacing: 2.5px; color: var(--green); text-transform: uppercase;
  }
  .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
 
  .search-wrap {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg4); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 10px 16px; width: 100%;
    transition: border-color .2s, background .2s;
  }
  .search-wrap:focus-within { border-color: var(--vd); background: var(--bg5); }
  .search-wrap input { background: none; border: none; outline: none; color: var(--text); font-family: var(--font-b); font-size: 13px; width: 100%; }
  .search-wrap input::placeholder { color: var(--text3); }
 
  /* ── TABS ── */
  .tabs {
    display: flex; padding: 0 20px;
    overflow-x: scroll; scrollbar-width: none; -ms-overflow-style: none;
    white-space: nowrap; background: var(--bg);
    border-bottom: 1px solid var(--border);
    gap: 2px;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 16px; font-family: var(--font-m); font-size: 8.5px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text3); cursor: pointer;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    white-space: nowrap; transition: color .2s, background .2s;
    display: flex; align-items: center; gap: 7px; user-select: none;
    margin-bottom: -1px; border: 1px solid transparent; border-bottom: none;
  }
  .tab:hover:not(.active) { color: var(--text2); background: rgba(167,139,250,.04); }
  .tab.active {
    color: var(--v); background: var(--bg3);
    border-color: var(--border2); border-bottom-color: var(--bg3);
  }
  .tab-n {
    font-size: 8px; background: var(--bg4); border: 1px solid var(--border2);
    border-radius: 6px; padding: 1px 6px; color: var(--text3);
  }
  .tab.active .tab-n { background: var(--vglow); border-color: rgba(167,139,250,.3); color: var(--v); }
 
  /* ── SLIDER ── */
  .scroll-slider-wrap { padding: 7px 24px 8px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .scroll-slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 3px; background: var(--border2); border-radius: 3px; outline: none; cursor: pointer; display: block;
  }
  .scroll-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 40px; height: 12px; border-radius: 6px;
    background: linear-gradient(90deg, var(--vd), var(--v));
    cursor: grab; border: none; box-shadow: 0 0 8px rgba(167,139,250,.4);
    transition: box-shadow .2s;
  }
  .scroll-slider:active::-webkit-slider-thumb { cursor: grabbing; box-shadow: 0 0 16px rgba(167,139,250,.6); }
  .scroll-slider::-moz-range-thumb { width: 40px; height: 12px; border-radius: 6px; border: none; background: linear-gradient(90deg, var(--vd), var(--v)); cursor: grab; }
 
  /* ── MAIN ── */
  .main { overflow-y: auto; padding: 24px 24px 48px; background: var(--bg2); scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
 
  /* ── SECTION BAR ── */
  .section-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .section-label { font-family: var(--font-m); font-size: 8.5px; letter-spacing: 3.5px; color: var(--vd); text-transform: uppercase; }
  .sort-select {
    background: var(--bg4); border: 1px solid var(--border2); border-radius: var(--radius-sm);
    color: var(--text2); font-family: var(--font-m); font-size: 8.5px; letter-spacing: 1px;
    padding: 6px 12px; outline: none; cursor: pointer; transition: border-color .2s;
  }
  .sort-select:focus { border-color: var(--vd); }
 
  /* ── CAT HEADER ── */
  .cat-header {
    display: flex; align-items: center; gap: 12px;
    margin: 32px 0 14px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border2);
    position: relative;
  }
  .cat-header::after {
    content: ''; position: absolute; bottom: -1px; left: 0; width: 60px; height: 1px;
    background: var(--v); opacity: 0.6;
  }
  .cat-header:first-of-type { margin-top: 0; }
  .cat-icon {
    width: 34px; height: 34px; border-radius: var(--radius-sm);
    background: var(--vglow); border: 1px solid rgba(167,139,250,.22);
    display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
  }
  .cat-title { font-family: var(--font-d); font-size: 22px; letter-spacing: 3px; color: var(--v); }
  .cat-count { font-family: var(--font-m); font-size: 8px; color: var(--text3); letter-spacing: 2px; margin-left: auto; }
 
  /* ── GRID ── */
  .pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin-bottom: 8px; }
 
  /* ── CARD ── */
  .card {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; cursor: pointer; transition: border-color .25s, transform .25s, box-shadow .25s;
    display: flex; flex-direction: column;
  }
  .card:hover { border-color: rgba(167,139,250,.5); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(124,92,191,.18); }
 
  .card-img {
    width: 100%; aspect-ratio: 1; background: var(--bg4);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .card-img::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(6,5,14,.5) 100%);
    pointer-events: none;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s; }
  .card:hover .card-img img { transform: scale(1.06); }
  .card-img .no-photo { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text3); }
  .card-img .no-photo svg { opacity: 0.25; }
  .card-img .no-photo span { font-family: var(--font-m); font-size: 7px; letter-spacing: 2.5px; text-transform: uppercase; opacity: 0.35; }
 
  .card-top { padding: 11px 13px 8px; }
  .card-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.35; }
 
  .card-tagline { font-size: 10px; color: var(--text3); line-height: 1.45; padding: 0 13px 8px; font-style: italic; }
 
  .card-body { padding: 8px 13px 12px; margin-top: auto; border-top: 1px solid var(--border); }
  .price-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 8px; }
  .price-sell { display: flex; flex-direction: column; gap: 1px; }
  .price-sell .lbl { font-family: var(--font-m); font-size: 7px; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; }
  .price-sell .val { font-family: var(--font-d); font-size: 22px; letter-spacing: .5px; color: var(--v); line-height: 1; }
 
  .bottom-row { display: flex; align-items: center; justify-content: space-between; }
  .stock-badge { font-family: var(--font-m); font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; font-weight: 700; }
  .st-stock { background: var(--greenb); color: var(--green); border: 1px solid rgba(52,211,153,.3); }
  .st-new   { background: var(--amberb); color: var(--amber); border: 1px solid rgba(251,191,36,.3); }
  .st-sold  { background: var(--redb);   color: var(--red);   border: 1px solid rgba(248,113,113,.3); }
  .st-dispo { background: var(--bg5); color: var(--text3); border: 1px solid var(--border2); }
 
  .add-btn {
    width: 26px; height: 26px; border-radius: var(--radius-sm);
    background: var(--vglow); border: 1px solid rgba(167,139,250,.35);
    color: var(--v); font-size: 18px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background .15s, box-shadow .15s; line-height: 1;
  }
  .add-btn:hover { background: rgba(167,139,250,.28); box-shadow: 0 0 10px rgba(167,139,250,.3); }
 
  /* ── PACK CARDS ── */
  .pack-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .pack-card {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; cursor: pointer; transition: border-color .25s, transform .25s, box-shadow .25s;
    display: flex; flex-direction: column;
  }
  .pack-card:hover { border-color: rgba(167,139,250,.5); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(124,92,191,.22); }
  .pack-card-img {
    width: 100%; aspect-ratio: 16/9; background: var(--bg4);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .pack-card-img::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(6,5,14,.7) 100%);
    pointer-events: none;
  }
  .pack-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s; }
  .pack-card:hover .pack-card-img img { transform: scale(1.05); }
  .pack-card-img .no-photo { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--text3); }
  .pack-card-img .no-photo span { font-family: var(--font-m); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; opacity: .35; }
  .pack-card-body { padding: 18px 20px 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .pack-ref { font-family: var(--font-m); font-size: 8px; letter-spacing: 3px; color: var(--vd); text-transform: uppercase; }
  .pack-name { font-family: var(--font-d); font-size: 24px; letter-spacing: 2px; color: var(--text); line-height: 1.1; }
  .pack-tagline { font-size: 11px; color: var(--text2); line-height: 1.6; flex: 1; }
  .pack-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 4px; }
  .pack-price { font-family: var(--font-d); font-size: 30px; letter-spacing: 1px; color: var(--v); line-height: 1; }
  .pack-btn {
    font-family: var(--font-m); font-size: 8px; letter-spacing: 2.5px; text-transform: uppercase;
    background: var(--vglow); border: 1px solid rgba(167,139,250,.4);
    color: var(--v); padding: 8px 16px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background .15s, box-shadow .15s;
  }
  .pack-btn:hover { background: rgba(167,139,250,.25); box-shadow: 0 0 12px rgba(167,139,250,.25); }
 
  /* ── EMPTY ── */
  .empty { text-align: center; padding: 80px; color: var(--text3); }
  .empty .e-icon { font-size: 40px; margin-bottom: 14px; opacity: .4; }
  .empty p { font-family: var(--font-m); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }
 
  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 28px; right: 28px; z-index: 1000;
    background: var(--bg4); border: 1px solid rgba(167,139,250,.4);
    border-radius: var(--radius); padding: 13px 18px;
    display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text);
    transform: translateY(80px); opacity: 0;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
    pointer-events: none; max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5), 0 0 20px rgba(167,139,250,.1);
  }
  /* ── SPLASH SCREEN ── */
  #splash {
    position: fixed; inset: 0; z-index: 99999;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0;
    transition: opacity .6s ease, transform .6s ease;
  }
  #splash.hide { opacity: 0; transform: scale(1.04); pointer-events: none; }
 
  .splash-logo {
    opacity: 0; transform: translateY(20px);
    animation: splashIn .7s cubic-bezier(.34,1.56,.64,1) .2s forwards;
  }
  .splash-logo svg { width: 72px; height: 72px; }
 
  .splash-title {
    font-family: var(--font-d); font-size: 52px; letter-spacing: 10px; color: var(--text);
    margin-top: 20px; line-height: 1;
    opacity: 0; transform: translateY(16px);
    animation: splashIn .7s cubic-bezier(.34,1.56,.64,1) .4s forwards;
  }
  .splash-sub {
    font-family: var(--font-m); font-size: 9px; letter-spacing: 6px; color: var(--vd);
    text-transform: uppercase; margin-top: 10px;
    opacity: 0;
    animation: splashFade .6s ease .7s forwards;
  }
  .splash-bar-wrap {
    margin-top: 48px; width: 180px; height: 2px;
    background: var(--border2); border-radius: 2px; overflow: hidden;
    opacity: 0; animation: splashFade .4s ease .8s forwards;
  }
  .splash-bar {
    height: 100%; width: 0%; border-radius: 2px;
    background: linear-gradient(90deg, var(--vd), var(--v));
    box-shadow: 0 0 10px var(--v);
    animation: splashLoad 1.2s cubic-bezier(.4,0,.2,1) .9s forwards;
  }
  .splash-glow {
    position: absolute; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,92,191,.25) 0%, transparent 70%);
    pointer-events: none;
    animation: splashPulse 2s ease-in-out infinite;
  }
 
  @keyframes splashIn   { to { opacity:1; transform:translateY(0); } }
  @keyframes splashFade { to { opacity:1; } }
  @keyframes splashLoad { to { width:100%; } }
  @keyframes splashPulse{ 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.1);opacity:1} }
</style>
</head>
<body>
 
<!-- SPLASH -->
<div id="splash">
  <div class="splash-glow"></div>
  <div class="splash-logo">
    <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="68" height="68" rx="10" stroke="#A78BFA" stroke-width="1.2" fill="#0d0a18"/>
      <path d="M14 56 L36 18 L58 56 Z" fill="none" stroke="#A78BFA" stroke-width="2"/>
      <path d="M23 42 L49 42" stroke="#A78BFA" stroke-width="1.8"/>
      <circle cx="36" cy="18" r="3" fill="#A78BFA"/>
      <circle cx="36" cy="18" r="6" fill="none" stroke="#A78BFA" stroke-width="0.6" opacity="0.4"/>
    </svg>
  </div>
  <div class="splash-title">Grove Street</div>
  <div class="splash-sub">LTD Collection — Catalogue</div>
  <div class="splash-bar-wrap"><div class="splash-bar"></div></div>
</div>
 
<div class="shell">
 
  <header class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-mark">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="38" height="38" rx="5" stroke="#A78BFA" stroke-width="0.8" fill="#0d0a18"/>
            <path d="M8 30 L20 10 L32 30 Z" fill="none" stroke="#A78BFA" stroke-width="1.4"/>
            <path d="M13 23 L27 23" stroke="#A78BFA" stroke-width="1.1"/>
            <circle cx="20" cy="10" r="1.8" fill="#A78BFA"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>Grove Street</h1>
          <span>LTD Collection — Catalogue</span>
        </div>
      </div>
      <div class="header-right">
        <div>
          <div class="clock-time" id="clock">--:--</div>
          <div class="clock-date" id="cdate">---</div>
        </div>
        <div class="status-pill"><span class="sdot"></span>En ligne</div>
      </div>
    </div>
    <div class="header-bottom">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4a4570" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Rechercher un article..." oninput="render()">
      </div>
    </div>
  </header>
 
  <nav class="tabs" id="tabs"></nav>
  <div class="scroll-slider-wrap">
    <input type="range" class="scroll-slider" id="tabsSlider" min="0" max="100" value="0" step="1">
  </div>
  <main class="main" id="main"></main>
</div>
 
<div class="toast" id="toast"><span class="tdot"></span><span id="toast-msg"></span></div>
 
<script>
// ════════════════════════════════════════════════════════════════════
//  FORMAT : [Catégorie, Nom, Source, Achat, Vente, Statut, IMAGE]
//  → Pour ajouter une photo : remplace null par 'https://i.imgur.com/TONID.jpg'
//  → Statuts dispo : '' | 'Epuise' | 'En stock' | 'Nouvel achat'
// ════════════════════════════════════════════════════════════════════
const RAW = [
 
  // ── JARDINAGE ──────────────────────────────────────────────────
  ['Jardinage', 'Fertilisant', 'Youtools', 5, 10, '', 'https://i.imgur.com/u78t07f.jpeg'],
  ['Jardinage', 'Pot de Fleur', 'Youtools', 5, 10, '', 'https://i.imgur.com/up3vvgX.jpeg'],
  ['Jardinage', 'Table', 'Youtools', 5, 10, '', 'https://i.imgur.com/QrAZyZi.jpeg'],
  ['Jardinage', 'Terre',              'Youtools',           0.20, 12,   '', null], // photo → 'https://i.imgur.com/XXXXXXX.jpg'
  ['Jardinage', 'Bac de jardinage',   'Youtools',           10,   18,   '', null], // photo → 'https://i.imgur.com/XXXXXXX.jpg'
  ['Jardinage', 'Lumiere violette',   'Craft',              null, 36,   '', null], // photo → 'https://i.imgur.com/XXXXXXX.jpg'
  ['Jardinage', 'Rose',               'Commande entreprise',null, 250,  '', null], // photo → 'https://i.imgur.com/XXXXXXX.jpg'
  ['Jardinage', 'Bouquet de Fleurs',  'Commande entreprise',null, 600,  '', null], // photo → 'https://i.imgur.com/XXXXXXX.jpg'
  ['Jardinage', 'Cisaille',           'Youtools',           750,  1050, '', null], // photo → 'https://i.imgur.com/XXXXXXX.jpg'

function srcClass(s) {
  s = (s||'').toLowerCase();
  if (s.includes('youtools')) return 'src-youtools';
  if (s.includes('caisse')) return 'src-caisse';
  if (s.includes('craft')) return 'src-craft';
  if (s.includes('digital')) return 'src-digital';
  if (s.includes('commande')) return 'src-commande';
  if (s.includes('zone')) return 'src-sport';
  return 'src-none';
}
function srcLabel(s) {
  if (!s) return '—';
  if (s.toLowerCase().includes('commande')) return 'Commande';
  if (s.toLowerCase().includes('zone')) return 'Zone Sport';
  return s;
}
function fmt(v) {
  if (v === null || v === undefined) return 'xx,xx $';
  return v.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' $';
}
function marg(buy,sell) {
  if (buy === null || !buy || !sell) return null;
  return Math.round(((sell-buy)/buy)*100);
}

let activeCat = 'Tous';
 
function buildTabs() {
  document.getElementById('tabs').innerHTML = CATS.map(c => {
    let n;
    if (c === 'Tous') n = DATA.filter(p => p.cat !== 'Pack' && p.cat !== 'Nouveauté').length;
    else if (c === 'Pack') n = PACK_DATA.length;
    else n = DATA.filter(p=>p.cat===c).length;
    return `<div class="tab ${c===activeCat?'active':''}" onclick="setCat('${c}',this)">${c} <span class="tab-n">${n}</span></div>`;
  }).join('');
}
 
function setCat(cat,el) {
  activeCat = cat;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

                <div style="font-family:var(--font-m);font-size:9px;letter-spacing:3px;text-transform:uppercase;opacity:.5;">Colle ton lien Imgur dans le code</div>
              </div>`
            : `<img src="${PROMO_IMG}" alt="Promo de la semaine" style="width:100%;border-radius:14px;border:1px solid var(--border2);display:block;">`
          }
        </div>
      </div>`;
    return;
  }
 
  // ── PAGE PACK ──
  if (activeCat === 'Pack') {
    const packs = q ? PACK_DATA.filter(p=>p.name.toLowerCase().includes(q)) : PACK_DATA;
    main.innerHTML = `
      <div class="section-bar">
        <div class="section-label">Packs — ${packs.length} pack${packs.length>1?'s':''}</div>
      </div>
      <div class="pack-grid">
        ${packs.map((p,i) => `
          <div class="pack-card">
            <div class="pack-card-img">
              ${p.img
                ? `<img src="${p.img}" alt="${p.name}" loading="lazy">`
                : `<div class="no-photo"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Photo</span></div>`
              }
            </div>
            <div class="pack-card-body">
              <div class="pack-ref">${p.ref}</div>
              <div class="pack-name">${p.name.toUpperCase()}</div>
              <div class="pack-tagline">${p.tagline}</div>
              <div class="pack-footer">
                <div class="pack-price">${p.price.toLocaleString('fr-FR')} $</div>
                <button class="pack-btn" onclick="showToast('${p.name}','${p.price.toLocaleString('fr-FR')} $')">VOIR +</button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>`;
    return;
  }
 
  // ── CATALOGUE NORMAL (Pack exclu de Tous) ──
  let list = DATA.filter(p => {
    const mc = (activeCat==='Tous' ? p.cat !== 'Pack' && p.cat !== 'Nouveauté' : p.cat===activeCat);
    const mq = !q || p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q);
    return mc && mq;
  });
 
  if (!list.length) { main.innerHTML='<div class="empty"><div style="font-size:36px">◇</div><p>Aucun article trouvé</p></div>'; return; }
 
  const groups = {};
  list.forEach(p => { if(!groups[p.cat]) groups[p.cat]=[]; groups[p.cat].push(p); });
 
  let html = `<div class="section-bar">
    <div class="section-label">${activeCat==='Tous'?'Catalogue complet':activeCat} — ${list.length} article${list.length>1?'s':''}</div>
    <select class="sort-select" onchange="sortD(this.value)">
      <option value="default">Ordre par défaut</option>
      <option value="asc">Prix vente ↑</option>
      <option value="desc">Prix vente ↓</option>
      <option value="alpha">A – Z</option>
    </select>
  </div>`;
 
  const catsToRender = activeCat==='Tous' ? Object.keys(CAT_ICONS).filter(c=>c!=='Pack'&&c!=='Promo de la semaine'&&c!=='Nouveauté') : [activeCat];
 
  for (const cat of catsToRender) {
    const items = groups[cat] || [];
    if (!items.length) continue;
 
    html += `<div class="cat-header"><div class="cat-icon">${CAT_ICONS[cat]||'📁'}</div><div class="cat-title">${cat}</div><div class="cat-count">${items.length} article${items.length!==1?'s':''}</div></div>`;
 
    html += `<div class="pgrid">
    ${items.map(p => {
      const stC = p.status==='Epuise'?'st-sold':p.status==='En stock'?'st-stock':p.status==='Nouvel achat'?'st-new':'st-dispo';
      const stL = p.status==='Epuise'?'Épuisé':p.status==='En stock'?'En stock':p.status==='Nouvel achat'?'Nouveau':'Dispo';
      const safeName = p.name.replace(/'/g,"\\'");
      const tagline = ITEM_TAGLINE[p.name] || '';
      return `<div class="card" onclick="showToast('${safeName}','${fmt(p.sell)}')">
        <div class="card-img">
          ${p.img
            ? `<img src="${p.img}" alt="${p.name}" loading="lazy">`
            : `<div class="no-photo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Photo</span></div>`
          }
        </div>
        <div class="card-top">
          <div class="card-name">${p.name}</div>
        </div>
        ${tagline ? `<div class="card-tagline">${tagline}</div>` : ''}
        <div class="card-body">
          <div class="price-row">
            <div class="price-sell"><span class="lbl">Prix</span><span class="val">${fmt(p.sell)}</span></div>
          </div>
          <div class="bottom-row">
            <div class="stock-badge ${stC}">${stL}</div>
            <button class="add-btn" onclick="event.stopPropagation();showToast('${safeName}','${fmt(p.sell)}')">+</button>
          </div>
        </div>
      </div>`;
    }).join('')}
    </div>`;
  }
 
  main.innerHTML = html;
}
 
function sortD(val) {
  if (val==='asc') DATA.sort((a,b)=>(a.sell||0)-(b.sell||0));
  else if (val==='desc') DATA.sort((a,b)=>(b.sell||0)-(a.sell||0));
  else if (val==='alpha') DATA.sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  else DATA.sort((a,b)=>a.cat.localeCompare(b.cat,'fr')||a.name.localeCompare(b.name,'fr'));
  render();
}
 
function showToast(name, price) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = name+' — '+price;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2800);
}
 
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const d=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'], mo=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  document.getElementById('cdate').textContent = d[n.getDay()]+' '+n.getDate()+' '+mo[n.getMonth()];
}
 
function initSlider() {
  const tabs = document.getElementById('tabs');
  const slider = document.getElementById('tabsSlider');
 
  function getMax() { return Math.max(0, tabs.scrollWidth - tabs.clientWidth); }
 
  // Slider → défile les onglets
  slider.addEventListener('input', () => {
    tabs.scrollLeft = (slider.value / 100) * getMax();
  });
 
  // Onglets scrollés → met à jour le slider
  tabs.addEventListener('scroll', () => {
    const max = getMax();
    slider.value = max > 0 ? (tabs.scrollLeft / max) * 100 : 0;
  });
 
  // Recalcul au resize
  window.addEventListener('resize', () => {
    const max = getMax();
    slider.value = max > 0 ? (tabs.scrollLeft / max) * 100 : 0;
  });
}
 
buildTabs();
render(); tick(); setInterval(tick,15000);
setTimeout(initSlider, 50);
 
// Splash dismiss après 2.4s
setTimeout(() => {
  const s = document.getElementById('splash');
  s.classList.add('hide');
  setTimeout(() => s.remove(), 700);
}, 2400);
</script>
</body>
</html>
