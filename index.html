<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LTD Grove Street — Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --v: #A78BFA;
    --vl: #C4B5FD;
    --vd: #7C5CBF;
    --vglow: rgba(167,139,250,0.15);
    --bg: #06050e;
    --bg2: #09081a;
    --bg3: #0e0c1c;
    --bg4: #151228;
    --bg5: #1c1832;
    --border: #1a1730;
    --border2: #251f45;
    --text: #f0ecff;
    --text2: #9b91c8;
    --text3: #4e4770;
    --green: #34d399;
    --greenb: rgba(52,211,153,.1);
    --amber: #fbbf24;
    --amberb: rgba(251,191,36,.1);
    --red: #f87171;
    --redb: rgba(248,113,113,.1);
    --font-d: 'Bebas Neue', sans-serif;
    --font-b: 'DM Sans', sans-serif;
    --font-m: 'Space Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }
 
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-b); font-size: 14px; overflow: hidden; }
 
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(167,139,250,0.008) 3px, rgba(167,139,250,0.008) 4px);
    pointer-events: none; z-index: 9999;
  }
  body::after {
    content: ''; position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(124,92,191,0.18) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
 
  .shell { display: grid; grid-template-rows: auto auto auto 1fr; height: 100vh; overflow: hidden; position: relative; z-index: 1; }
 
  .header { background: rgba(6,5,14,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border2); position: relative; }
  .header::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 0%, var(--vd) 40%, var(--v) 60%, transparent 100%); opacity: 0.5; }
  .header-top { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px 10px; }
  .header-bottom { padding: 0 28px 14px; }
 
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-mark { position: relative; }
  .logo-mark::after { content: ''; position: absolute; inset: -4px; border-radius: 10px; background: radial-gradient(circle, rgba(167,139,250,0.15), transparent 70%); pointer-events: none; }
  .logo-mark svg { width: 42px; height: 42px; display: block; }
  .logo-text h1 { font-family: var(--font-d); font-size: 26px; letter-spacing: 5px; color: var(--text); line-height: 1; }
  .logo-text span { font-family: var(--font-m); font-size: 7px; letter-spacing: 5px; color: var(--vd); display: block; margin-top: 3px; text-transform: uppercase; }
 
  .header-right { display: flex; align-items: center; gap: 16px; }
  .clock-time { font-family: var(--font-m); font-size: 22px; color: var(--text); letter-spacing: 3px; line-height: 1; text-align: right; }
  .clock-date { font-family: var(--font-m); font-size: 8px; color: var(--text3); letter-spacing: 2px; margin-top: 3px; text-transform: uppercase; text-align: right; }
 
  .status-pill { display: flex; align-items: center; gap: 7px; background: rgba(52,211,153,0.07); border: 1px solid rgba(52,211,153,0.2); border-radius: 20px; padding: 6px 14px; font-family: var(--font-m); font-size: 8px; letter-spacing: 2.5px; color: var(--green); text-transform: uppercase; }
  .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
 
  .search-wrap { display: flex; align-items: center; gap: 10px; background: var(--bg4); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 16px; width: 100%; transition: border-color .2s, background .2s; }
  .search-wrap:focus-within { border-color: var(--vd); background: var(--bg5); }
  .search-wrap input { background: none; border: none; outline: none; color: var(--text); font-family: var(--font-b); font-size: 13px; width: 100%; }
  .search-wrap input::placeholder { color: var(--text3); }
 
  .tabs { display: flex; padding: 0 20px; overflow-x: scroll; scrollbar-width: none; -ms-overflow-style: none; white-space: nowrap; background: var(--bg); border-bottom: 1px solid var(--border); gap: 2px; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 10px 16px; font-family: var(--font-m); font-size: 8.5px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); cursor: pointer; border-radius: var(--radius-sm) var(--radius-sm) 0 0; white-space: nowrap; transition: color .2s, background .2s; display: flex; align-items: center; gap: 7px; user-select: none; margin-bottom: -1px; border: 1px solid transparent; border-bottom: none; }
  .tab:hover:not(.active) { color: var(--text2); background: rgba(167,139,250,.04); }
  .tab.active { color: var(--v); background: var(--bg3); border-color: var(--border2); border-bottom-color: var(--bg3); }
  .tab-n { font-size: 8px; background: var(--bg4); border: 1px solid var(--border2); border-radius: 6px; padding: 1px 6px; color: var(--text3); }
  .tab.active .tab-n { background: var(--vglow); border-color: rgba(167,139,250,.3); color: var(--v); }
  .tab-notif { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: notifPulse 1.2s ease-in-out infinite; flex-shrink: 0; }
  @keyframes notifPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }
 
  .scroll-slider-wrap { padding: 7px 24px 8px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .scroll-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 3px; background: var(--border2); border-radius: 3px; outline: none; cursor: pointer; display: block; }
  .scroll-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 40px; height: 12px; border-radius: 6px; background: linear-gradient(90deg, var(--vd), var(--v)); cursor: grab; border: none; box-shadow: 0 0 8px rgba(167,139,250,.4); }
  .scroll-slider:active::-webkit-slider-thumb { cursor: grabbing; box-shadow: 0 0 16px rgba(167,139,250,.6); }
  .scroll-slider::-moz-range-thumb { width: 40px; height: 12px; border-radius: 6px; border: none; background: linear-gradient(90deg, var(--vd), var(--v)); cursor: grab; }
 
  .main { overflow-y: auto; padding: 24px 24px 48px; background: var(--bg2); scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
 
  .section-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .section-label { font-family: var(--font-m); font-size: 8.5px; letter-spacing: 3.5px; color: var(--vd); text-transform: uppercase; }
  .sort-select { background: var(--bg4); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text2); font-family: var(--font-m); font-size: 8.5px; letter-spacing: 1px; padding: 6px 12px; outline: none; cursor: pointer; }
 
  .cat-header { display: flex; align-items: center; gap: 12px; margin: 32px 0 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border2); position: relative; }
  .cat-header::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 60px; height: 1px; background: var(--v); opacity: 0.6; }
  .cat-header:first-of-type { margin-top: 0; }
  .cat-icon { width: 34px; height: 34px; border-radius: var(--radius-sm); background: var(--vglow); border: 1px solid rgba(167,139,250,.22); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .cat-title { font-family: var(--font-d); font-size: 22px; letter-spacing: 3px; color: var(--v); }
  .cat-count { font-family: var(--font-m); font-size: 8px; color: var(--text3); letter-spacing: 2px; margin-left: auto; }
 
  .pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin-bottom: 8px; }
 
  .card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: border-color .25s, transform .25s, box-shadow .25s; display: flex; flex-direction: column; }
  .card:hover { border-color: rgba(167,139,250,.5); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(124,92,191,.18); }
 
  .card-img { width: 100%; aspect-ratio: 1; background: var(--bg4); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .card-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 60%, rgba(6,5,14,.5) 100%); pointer-events: none; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s; }
  .card:hover .card-img img { transform: scale(1.06); }
  .card-img .no-photo { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text3); }
  .card-img .no-photo svg { opacity: 0.25; }
  .card-img .no-photo span { font-family: var(--font-m); font-size: 7px; letter-spacing: 2.5px; text-transform: uppercase; opacity: 0.35; }
 
  .card-top { padding: 11px 13px 8px; }
  .card-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.35; }
  .card-tagline { font-size: 10px; color: var(--text3); line-height: 1.45; padding: 0 13px 8px; font-style: italic; }
 
  .card-body { padding: 8px 13px 12px; margin-top: auto; border-top: 1px solid var(--border); }
  .price-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 8px; }
  .price-sell { display: flex; flex-direction: column; gap: 1px; }
  .price-sell .lbl { font-family: var(--font-m); font-size: 7px; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; }
  .price-sell .val { font-family: var(--font-d); font-size: 22px; letter-spacing: .5px; color: var(--v); line-height: 1; }
 
  .bottom-row { display: flex; align-items: center; justify-content: space-between; }
  .stock-badge { font-family: var(--font-m); font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; font-weight: 700; }
  .st-stock { background: var(--greenb); color: var(--green); border: 1px solid rgba(52,211,153,.3); }
  .st-new   { background: var(--amberb); color: var(--amber); border: 1px solid rgba(251,191,36,.3); }
  .st-sold  { background: var(--redb);   color: var(--red);   border: 1px solid rgba(248,113,113,.3); }
  .st-dispo { background: var(--bg5); color: var(--text3); border: 1px solid var(--border2); }
 
  .add-btn { width: 26px; height: 26px; border-radius: var(--radius-sm); background: var(--vglow); border: 1px solid rgba(167,139,250,.35); color: var(--v); font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .15s, box-shadow .15s; line-height: 1; }
  .add-btn:hover { background: rgba(167,139,250,.28); box-shadow: 0 0 10px rgba(167,139,250,.3); }
 
  .pack-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .pack-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: border-color .25s, transform .25s, box-shadow .25s; display: flex; flex-direction: column; }
  .pack-card:hover { border-color: rgba(167,139,250,.5); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(124,92,191,.22); }
  .pack-card-img { width: 100%; aspect-ratio: 16/9; background: var(--bg4); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .pack-card-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 40%, rgba(6,5,14,.7) 100%); pointer-events: none; }
  .pack-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s; }
  .pack-card:hover .pack-card-img img { transform: scale(1.05); }
  .pack-card-img .no-photo { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--text3); }
  .pack-card-img .no-photo span { font-family: var(--font-m); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; opacity: .35; }
  .pack-card-body { padding: 18px 20px 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .pack-ref { font-family: var(--font-m); font-size: 8px; letter-spacing: 3px; color: var(--vd); text-transform: uppercase; }
  .pack-name { font-family: var(--font-d); font-size: 24px; letter-spacing: 2px; color: var(--text); line-height: 1.1; }
  .pack-tagline { font-size: 11px; color: var(--text2); line-height: 1.6; flex: 1; }
  .pack-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 4px; }
  .pack-price { font-family: var(--font-d); font-size: 30px; letter-spacing: 1px; color: var(--v); line-height: 1; }
  .pack-btn { font-family: var(--font-m); font-size: 8px; letter-spacing: 2.5px; text-transform: uppercase; background: var(--vglow); border: 1px solid rgba(167,139,250,.4); color: var(--v); padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; transition: background .15s, box-shadow .15s; }
  .pack-btn:hover { background: rgba(167,139,250,.25); box-shadow: 0 0 12px rgba(167,139,250,.25); }
 
  .empty { text-align: center; padding: 80px; color: var(--text3); }
  .empty p { font-family: var(--font-m); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }
 
  .toast { position: fixed; bottom: 100px; right: 28px; z-index: 2000; background: var(--bg4); border: 1px solid rgba(167,139,250,.4); border-radius: var(--radius); padding: 12px 16px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text); transform: translateY(30px); opacity: 0; transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .25s; pointer-events: none; max-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
  .toast.show { transform: translateY(0); opacity: 1; }
  .tdot { width: 7px; height: 7px; border-radius: 50%; background: var(--v); box-shadow: 0 0 8px var(--v); flex-shrink: 0; }
 
  .fly-dot { position: fixed; width: 10px; height: 10px; border-radius: 50%; background: var(--v); box-shadow: 0 0 10px var(--v); pointer-events: none; z-index: 9998; }
  @keyframes badgeBump { 0%{transform:scale(1)} 40%{transform:scale(1.6)} 100%{transform:scale(1)} }
  .cart-badge.bump { animation: badgeBump .35s cubic-bezier(.34,1.56,.64,1); }
 
  .cart-fab { position: fixed; bottom: 28px; right: 28px; z-index: 1001; width: 58px; height: 58px; border-radius: 50%; background: linear-gradient(135deg, var(--vd), var(--v)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(124,92,191,.5), 0 0 30px rgba(167,139,250,.15); transition: transform .2s, box-shadow .2s; }
  .cart-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(124,92,191,.7); }
  .cart-fab:active { transform: scale(0.95); }
  .cart-fab svg { width: 22px; height: 22px; stroke: #fff; }
  .cart-badge { position: absolute; top: -3px; right: -3px; background: var(--amber); color: #000; font-family: var(--font-m); font-size: 9px; font-weight: 700; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); opacity: 0; transform: scale(0); transition: opacity .2s, transform .25s cubic-bezier(.34,1.56,.64,1); }
  .cart-badge.show { opacity: 1; transform: scale(1); }
 
  .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 1002; opacity: 0; pointer-events: none; transition: opacity .3s; backdrop-filter: blur(4px); }
  .cart-overlay.show { opacity: 1; pointer-events: all; }
 
  .cart-panel { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1003; background: var(--bg3); border-top: 1px solid var(--border2); border-radius: 20px 20px 0 0; transform: translateY(100%); transition: transform .36s cubic-bezier(.34,1.1,.64,1); max-height: 78vh; display: flex; flex-direction: column; box-shadow: 0 -8px 40px rgba(0,0,0,.6); }
  .cart-panel.show { transform: translateY(0); }
  .cart-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border2); margin: 12px auto 0; flex-shrink: 0; }
  .cart-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .cart-title { font-family: var(--font-d); font-size: 24px; letter-spacing: 3px; color: var(--v); }
  .cart-clear { font-family: var(--font-m); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--red); background: var(--redb); border: 1px solid rgba(248,113,113,.25); border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer; transition: background .15s; }
  .cart-clear:hover { background: rgba(248,113,113,.2); }
  .cart-items { overflow-y: auto; flex: 1; padding: 6px 20px 10px; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
  .cart-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-img { width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--bg4); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
  .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-unit { font-family: var(--font-m); font-size: 9px; color: var(--text3); margin-top: 2px; }
  .cart-item-qty { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .qty-btn { width: 26px; height: 26px; border-radius: 6px; background: var(--bg5); border: 1px solid var(--border2); color: var(--text2); font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; line-height: 1; }
  .qty-btn:hover { background: var(--vglow); border-color: rgba(167,139,250,.35); color: var(--v); }
  .qty-num { font-family: var(--font-m); font-size: 13px; color: var(--text); min-width: 22px; text-align: center; }
  .cart-item-total { font-family: var(--font-d); font-size: 18px; color: var(--v); min-width: 75px; text-align: right; flex-shrink: 0; }
  .cart-empty-msg { text-align: center; padding: 44px 20px; color: var(--text3); font-family: var(--font-m); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; }
  .cart-footer { padding: 14px 20px 32px; border-top: 1px solid var(--border2); display: flex; align-items: center; justify-content: space-between; background: var(--bg4); flex-shrink: 0; }
  .cart-total-label { font-family: var(--font-m); font-size: 8px; letter-spacing: 2.5px; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
  .cart-total-val { font-family: var(--font-d); font-size: 34px; letter-spacing: 1px; color: var(--v); line-height: 1; }
  .cart-count-info { font-family: var(--font-m); font-size: 9px; color: var(--text3); margin-top: 3px; }

  /* ── THEME SWITCHER ── */
  .theme-btn { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: var(--radius-sm); background: var(--bg4); border: 1px solid var(--border2); cursor: pointer; font-size: 16px; transition: background .15s, border-color .15s; flex-shrink: 0; }
  .theme-btn:hover { background: var(--vglow); border-color: rgba(167,139,250,.4); }
  .theme-panel { position: absolute; top: calc(100% + 8px); right: 0; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px; display: flex; gap: 10px; z-index: 500; box-shadow: 0 8px 32px rgba(0,0,0,.5); opacity: 0; pointer-events: none; transform: translateY(-8px); transition: opacity .2s, transform .2s; }
  .theme-panel.show { opacity: 1; pointer-events: all; transform: translateY(0); }
  .theme-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .15s, border-color .15s; }
  .theme-swatch:hover { transform: scale(1.2); }
  .theme-swatch.active { border-color: var(--text); }
  .theme-wrap { position: relative; }

  /* ── LIGHTBOX ── */
  .lightbox { position: fixed; inset: 0; z-index: 99990; background: rgba(0,0,0,.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
  .lightbox.show { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 90vw; max-height: 88vh; border-radius: var(--radius); box-shadow: 0 0 60px rgba(167,139,250,.3); transform: scale(.92); transition: transform .25s cubic-bezier(.34,1.56,.64,1); }
  .lightbox.show img { transform: scale(1); }
  .lightbox-close { position: absolute; top: 20px; right: 24px; font-size: 28px; color: var(--text2); cursor: pointer; background: var(--bg4); border: 1px solid var(--border2); border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; transition: color .15s, background .15s; }
  .lightbox-close:hover { color: var(--v); background: var(--vglow); }

  #splash { position: fixed; inset: 0; z-index: 99999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity .6s ease, transform .6s ease; }
  #splash.hide { opacity: 0; transform: scale(1.04); pointer-events: none; }
  .splash-logo { opacity: 0; transform: translateY(20px); animation: splashIn .7s cubic-bezier(.34,1.56,.64,1) .2s forwards; }
  .splash-logo svg { width: 72px; height: 72px; }

  .splash-sub { font-family: var(--font-m); font-size: 9px; letter-spacing: 6px; color: var(--vd); text-transform: uppercase; margin-top: 10px; opacity: 0; animation: splashFade .6s ease .7s forwards; }
  .splash-bar-wrap { margin-top: 48px; width: 180px; height: 2px; background: var(--border2); border-radius: 2px; overflow: hidden; opacity: 0; animation: splashFade .4s ease .8s forwards; }
  .splash-bar { height: 100%; width: 0%; border-radius: 2px; background: linear-gradient(90deg, var(--vd), var(--v)); box-shadow: 0 0 10px var(--v); animation: splashLoad 1.2s cubic-bezier(.4,0,.2,1) .9s forwards; }
  .splash-glow { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,92,191,.25) 0%, transparent 70%); pointer-events: none; animation: splashPulse 2s ease-in-out infinite; }

  @keyframes splashIn   { to { opacity:1; transform:translateY(0); } }
  @keyframes splashFade { to { opacity:1; } }
  @keyframes splashLoad { to { width:100%; } }
  @keyframes splashPulse{ 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.1);opacity:1} }
</style>

let cart = [];

function flyToCart(originEl) {
  const fab = document.getElementById('cartFab');
  const fabRect = fab.getBoundingClientRect();
  const oRect = originEl.getBoundingClientRect();
  const dot = document.createElement('div');
  dot.className = 'fly-dot';
  dot.style.left = (oRect.left + oRect.width / 2 - 5) + 'px';
  dot.style.top  = (oRect.top  + oRect.height / 2 - 5) + 'px';
  document.body.appendChild(dot);
  const destX = fabRect.left + fabRect.width / 2 - 5;
  const destY = fabRect.top  + fabRect.height / 2 - 5;
  const startX = parseFloat(dot.style.left);
  const startY = parseFloat(dot.style.top);
  const dur = 500, t0 = performance.now();
  function step(now) {
    const t = Math.min((now - t0) / dur, 1);
    const e = t < .5 ? 2*t*t : -1+(4-2*t)*t;
    dot.style.left = (startX + (destX - startX) * e) + 'px';
    dot.style.top  = (startY + (destY - startY) * e) + 'px';
    dot.style.opacity = String(1 - t * 0.4);
    dot.style.transform = 'scale(' + (1 - t * 0.5) + ')';
    if (t < 1) requestAnimationFrame(step);
    else {
      dot.remove();
      const b = document.getElementById('cartBadge');
      b.classList.remove('bump'); void b.offsetWidth; b.classList.add('bump');
      setTimeout(() => b.classList.remove('bump'), 400);
    }
  }
  requestAnimationFrame(step);
}

function addToCart(name, price, img, originEl) {
  const ex = cart.find(i => i.name === name);
  if (ex) ex.qty++;
  else cart.push({ name, price: parseFloat(price) || 0, img: img || null, qty: 1 });
  if (originEl) flyToCart(originEl);
  updateCartUI();
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = name + ' ajouté';
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 1600);
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const count = cart.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = count;
  badge.classList.toggle('show', count > 0);
  document.getElementById('cartTotal').textContent = total.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' $';
  document.getElementById('cartCountInfo').textContent = count + ' article' + (count > 1 ? 's' : '');
  const el = document.getElementById('cartItems');
  if (!cart.length) { el.innerHTML = '<div class="cart-empty-msg">Panier vide</div>'; return; }
  el.innerHTML = cart.map((item, idx) => `
    <div class="cart-item">
      <div class="cart-item-img">
        ${item.img ? `<img src="${item.img}" loading="lazy">` : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4e4770" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>`}
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-unit">${item.price.toLocaleString('fr-FR',{minimumFractionDigits:2})} $ / u.</div>
      </div>
      <div class="cart-item-qty">
        <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
        <div class="qty-num">${item.qty}</div>
        <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
      </div>
      <div class="cart-item-total">${(item.price*item.qty).toLocaleString('fr-FR',{minimumFractionDigits:2})} $</div>
    </div>
  `).join('');
}

function changeQty(idx, d) {
  cart[idx].qty += d;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateCartUI();
}
function clearCart() { cart = []; updateCartUI(); }
function toggleCart() {
  const p = document.getElementById('cartPanel'), o = document.getElementById('cartOverlay');
  if (p.classList.contains('show')) closeCart();
  else { updateCartUI(); p.classList.add('show'); o.classList.add('show'); }
}
function closeCart() {
  document.getElementById('cartPanel').classList.remove('show');
  document.getElementById('cartOverlay').classList.remove('show');
}

  if (val==='asc') DATA.sort((a,b)=>(a.sell||0)-(b.sell||0));
  else if (val==='desc') DATA.sort((a,b)=>(b.sell||0)-(a.sell||0));
  else if (val==='alpha') DATA.sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  else DATA.sort((a,b)=>a.cat.localeCompare(b.cat,'fr')||a.name.localeCompare(b.name,'fr'));
  render();
}

function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const d=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'], mo=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  document.getElementById('cdate').textContent = d[n.getDay()]+' '+n.getDate()+' '+mo[n.getMonth()];
}

function initSlider() {
  const tabs = document.getElementById('tabs');
  const slider = document.getElementById('tabsSlider');
  function getMax() { return Math.max(0, tabs.scrollWidth - tabs.clientWidth); }
  slider.addEventListener('input', () => { tabs.scrollLeft = (slider.value / 100) * getMax(); });
  tabs.addEventListener('scroll', () => { const m = getMax(); slider.value = m > 0 ? (tabs.scrollLeft / m) * 100 : 0; });
  window.addEventListener('resize', () => { const m = getMax(); slider.value = m > 0 ? (tabs.scrollLeft / m) * 100 : 0; });
}

buildTabs();
render(); tick(); setInterval(tick, 15000);
setTimeout(initSlider, 50);
updateCartUI();

setTimeout(() => {
  const s = document.getElementById('splash');
  s.classList.add('hide');
  setTimeout(() => s.remove(), 700);
}, 2400);
</script>
